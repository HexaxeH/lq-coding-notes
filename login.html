<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>复古未来登录页</title>
  <style>
    :root {
      --bg: #080511;
      --bg-2: #130b26;
      --panel: rgba(16, 12, 34, 0.78);
      --text: #e9f7ff;
      --muted: #a6bdd9;
      --accent: #36e4ff;
      --accent-2: #ff52d1;
      --ok: #52ffb8;
      --error: #ff7e9e;
      --ring: rgba(54, 228, 255, 0.45);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(54, 228, 255, 0.2), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(255, 82, 209, 0.16), transparent 40%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .scanlines::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.04) 0px,
        rgba(255, 255, 255, 0.04) 1px,
        transparent 2px,
        transparent 4px
      );
      mix-blend-mode: soft-light;
    }

    .card {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid rgba(54, 228, 255, 0.25);
      border-radius: var(--radius);
      backdrop-filter: blur(6px);
      box-shadow:
        0 14px 48px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 82, 209, 0.18) inset,
        0 0 30px rgba(54, 228, 255, 0.12);
      padding: 28px 24px 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(54, 228, 255, 0.45);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      color: #d5ecff;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      border: 1px solid rgba(166, 189, 217, 0.35);
      border-radius: 12px;
      background: rgba(8, 5, 17, 0.65);
      color: var(--text);
      padding: 11px 12px;
      font-size: 1rem;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    input::placeholder {
      color: #87a3c2;
    }

    input:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .checkbox input {
      accent-color: var(--accent);
    }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .link:hover,
    .link:focus-visible {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      color: #07111a;
      background: linear-gradient(110deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 20px rgba(54, 228, 255, 0.25);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(54, 228, 255, 0.32);
      filter: saturate(1.06);
    }

    .btn:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    .status {
      margin: 14px 0 0;
      min-height: 1.4em;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--ok);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px 18px 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body class="scanlines">
  <main class="card" aria-labelledby="login-title">
    <h1 id="login-title">Neon Gate</h1>
    <p class="subtitle">进入复古未来终端，请完成身份验证</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">邮箱</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          required
          placeholder="you@example.com"
          aria-describedby="email-hint"
        />
        <span id="email-hint" class="sr-only">请输入有效邮箱地址</span>
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          minlength="8"
          placeholder="至少 8 位"
          aria-describedby="pwd-hint"
        />
        <span id="pwd-hint" class="sr-only">密码至少 8 位</span>
      </div>

      <div class="row">
        <label class="checkbox" for="remember">
          <input id="remember" name="remember" type="checkbox" />
          记住我
        </label>
        <a class="link" href="#" aria-label="找回密码">忘记密码？</a>
      </div>

      <button class="btn" type="submit">登录</button>
      <p id="form-status" class="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const statusEl = document.getElementById("form-status");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.classList.remove("error", "success");
      if (type) statusEl.classList.add(type);
    }

    function validate() {
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!emailEl.checkValidity()) {
        setStatus("请输入有效的邮箱地址。", "error");
        emailEl.focus();
        return false;
      }

      if (!passwordEl.checkValidity()) {
        setStatus("密码至少 8 位。", "error");
        passwordEl.focus();
        return false;
      }

      if (password.includes(" ")) {
        setStatus("密码不能包含空格。", "error");
        passwordEl.focus();
        return false;
      }

      setStatus("");
      return { email, password };
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const data = validate();
      if (!data) return;

      setStatus("身份验证中，请稍候...", null);

      window.setTimeout(() => {
        setStatus("登录成功，欢迎回来。", "success");
      }, 650);
    });
  </script>
</body>
</html>
